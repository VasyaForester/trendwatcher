# Декларативный конфиг источников TrendWatcher.
# type: rss | arxiv | nvd — определяет коннектор.
# source_type: news | research | vulnerability | vendor | standards | incident
# trust: вес доверия источника (0..1), влияет на скоринг событий.
# filter_ai: true — строгий отсев: только AI security / breakthrough AI
#   (не любое упоминание «AI»). Сайты без публичного RSS сюда не входят:
#   Bloomberg/WSJ/многие paywall и HTML-only страницы не парсятся.

sources:
  # --- Research / CVE ---
  - id: arxiv_ai_security
    name: "arXiv — AI Security papers"
    type: arxiv
    source_type: research
    trust: 0.9
    max_results: 800
    query: >-
      (cat:cs.CR OR cat:cs.AI OR cat:cs.CL OR cat:cs.LG) AND
      (abs:"prompt injection" OR abs:"jailbreak" OR abs:"LLM security" OR
       abs:"adversarial attack on language model" OR abs:"data poisoning" OR
       abs:"model extraction" OR abs:"AI red teaming" OR abs:"agent security" OR
       abs:"backdoor attack" OR abs:"guardrails")

  - id: arxiv_ai_general
    name: "arXiv — AI general trends"
    type: arxiv
    source_type: research
    trust: 0.9
    max_results: 500
    query: >-
      (cat:cs.AI OR cat:cs.LG OR cat:cs.CL OR cat:cs.MA) AND
      (abs:"self-evolving" OR abs:"self-improving agent" OR abs:"multi-agent system" OR
       abs:"agentic" OR abs:"test-time scaling" OR abs:"world model" OR
       abs:"reasoning model" OR abs:"mixture-of-experts" OR abs:"small language model" OR
       abs:"synthetic data generation" OR abs:"long context" OR abs:"agent memory" OR
       abs:"model context protocol" OR abs:"MCP server" OR abs:"tool-using agent" OR
       abs:"computer-use agent" OR abs:"browser agent" OR abs:"autonomous cyber" OR
       abs:"indirect prompt injection" OR abs:"multimodal injection")

  - id: nvd_ai
    name: "NVD — CVE по AI-продуктам"
    type: nvd
    source_type: vulnerability
    trust: 1.0
    days_back: 120
    keywords:
      - "large language model"
      - "LLM"
      - "artificial intelligence"

