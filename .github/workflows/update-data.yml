# Автообновление данных TrendWatcher без участия человека и без изменения хостинга.
#
# Раз в сутки: восстанавливает широкий корпус из compact ledger (JSONL в git),
# добирает свежий хвост источников, пересчитывает аналитику и коммитит
# data.json + архив. SQLite в git НЕ коммитится (лимит 100 MB).
# Сайт читает data.json по raw-ссылке (DATA_URL в web/index.html).

name: Update trend data

on:
  schedule:
    - cron: "0 5 * * *"   # каждый день в 05:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore corpus, ingest, export
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          # Широкая история из Git (documents.jsonl), иначе data.json схлопывается до хвоста.
          python run.py restore-db
          python run.py ingest
          python run.py score-tbsf
          python run.py export
          cp dist/site/data.json data.json

      - name: Commit updated data
        run: |
          git config user.name "trendwatcher-bot"
          git config user.email "actions@github.com"
          git rm -f --ignore-unmatch data/trendwatcher.db
          git add data.json data/archive/
          git diff --cached --quiet || git commit -m "data: auto-update $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push
