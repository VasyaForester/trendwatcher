# Автообновление данных TrendWatcher без участия человека и без изменения хостинга.
#
# Раз в сутки: восстанавливает широкий корпус из compact ledger (JSONL в git),
# добирает свежий хвост источников, пересчитывает аналитику и коммитит
# data.json + архив. SQLite в git НЕ коммитится (лимит 100 MB).
# Сайт читает data.json по raw-ссылке (DATA_URL в web/index.html).

name: Update trend data

on:
  schedule:
    - cron: "0 5 * * *"   # каждый день в 05:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Fulltext не в ledger/git — кэш между прогонами, иначе каждый CI качает arXiv по ~3с/статью.
      - name: Restore arXiv fulltext cache
        uses: actions/cache@v4
        with:
          path: data/fulltext_cache
          key: arxiv-fulltext-${{ github.run_id }}
          restore-keys: |
            arxiv-fulltext-

      - name: Restore corpus from ledger
        run: python run.py restore-db

      - name: Ingest sources
        run: python run.py ingest

      - name: Score TBSF
        run: python run.py score-tbsf

      - name: Export data.json
        run: |
          python run.py export
          cp dist/site/data.json data.json

      - name: Commit updated data
        run: |
          git config user.name "trendwatcher-bot"
          git config user.email "actions@github.com"
          git rm -f --ignore-unmatch data/trendwatcher.db
          git add data.json data/archive/
          git diff --cached --quiet || git commit -m "data: auto-update $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push
